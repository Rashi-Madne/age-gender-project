<!DOCTYPE html>
<html>
<head>
  <title>AI Vision Dashboard</title>

  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #0f172a;
      height: 100vh;
      padding: 20px;
    }

    .logo {
      font-size: 18px;
      color: #38bdf8;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .menu div {
      padding: 10px;
      cursor: pointer;
      color: #94a3b8;
    }

    .menu div:hover {
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      font-size: 22px;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    /* VIEW SYSTEM */
    .view {
      display: none;
    }

    .active {
      display: block;
    }

    /* CAMERA */
    .camera-box {
      position: relative;
      background: #111827;
      padding: 10px;
      border-radius: 12px;
      width: fit-content;
    }

    video {
      width: 600px;
      border-radius: 10px;
    }

    canvas {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    /* CARDS */
    .card {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
      width: 250px;
    }

    .title {
      color: #94a3b8;
      font-size: 13px;
    }

    .value {
      font-size: 20px;
      color: #22c55e;
      margin-top: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">🧠 AI DASHBOARD</div>

    <div class="menu">
      <div onclick="showView('live')">📷 Live</div>
      <div onclick="showView('analytics')">📊 Analytics</div>
      <div onclick="showView('settings')">⚙ Settings</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">Real-time AI Vision System</div>

    <!-- LIVE VIEW -->
    <div id="liveView" class="view active">

      <div class="camera-box">
        <video id="video" autoplay muted></video>
      </div>

      <div class="card">
        <div class="title">Status</div>
        <div id="status" class="value">Starting...</div>
      </div>

      <div class="card">
        <div class="title">Gender</div>
        <div id="gender" class="value">-</div>
      </div>

      <div class="card">
        <div class="title">Age Range</div>
        <div id="age" class="value">-</div>
      </div>

      <div class="card">
        <button onclick="toggleDetection()" id="btn">
          ⏯ Pause
        </button>
      </div>

    </div>

    <!-- ANALYTICS -->
    <div id="analyticsView" class="view">
      <div class="card">
        <div class="title">Analytics</div>
        <div class="value">Face Detection: Active</div>
        <div class="value">AI Model: Loaded</div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settingsView" class="view">
      <div class="card">
        <div class="title">Settings</div>
        <div class="value">Camera: ON</div>
        <div class="value">Mode: Real-time</div>
      </div>
    </div>

  </div>

</body>
</html>
