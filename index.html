
<!DOCTYPE html>
<html>
<head>
  <title>AI Face Detection App</title>

  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
      color: #38bdf8;
    }

    .wrapper {
      position: relative;
      display: inline-block;
      margin-top: 20px;
    }

    video {
      width: 720px;
      max-width: 90vw;
      border-radius: 12px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      color: #22c55e;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>🧠 AI Face Detection (Age + Gender)</h2>

  <div class="wrapper">
    <video id="video" autoplay muted></video>
  </div>

  <div id="result">Starting...</div>

  <br>
  <button onclick="takeSnapshot()">📸 Snapshot</button>

</body>
</html>
