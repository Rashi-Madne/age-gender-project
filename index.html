<!DOCTYPE html>
<html>
<head>
  <title>AI Face Detection</title>

  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
      color: #38bdf8;
    }

    .wrapper {
      position: relative;
      display: inline-block;
      margin-top: 20px;
    }

    video {
      width: 720px;
      max-width: 95vw;
      border-radius: 12px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #result {
      margin-top: 15px;
      font-size: 20px;
      color: #22c55e;
    }
  </style>
</head>

<body>

  <h2>🧠 AI Face Detection (Age + Gender)</h2>

  <div class="wrapper">
    <video id="video" autoplay muted></video>
  </div>

  <div id="result">Starting...</div>

</body>
</html>
