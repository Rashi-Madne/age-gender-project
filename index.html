<!DOCTYPE html>
<html>
<head>
  <title>AI Vision Dashboard</title>

  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      display: flex;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 220px;
      background: #0f172a;
      height: 100vh;
      padding: 20px;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .menu div {
      margin: 12px 0;
      color: #94a3b8;
      cursor: pointer;
    }

    .menu div:hover {
      color: white;
    }

    /* ================= MAIN ================= */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      font-size: 22px;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    .dashboard {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* CAMERA */
    .camera-box {
      position: relative;
      background: #111827;
      padding: 10px;
      border-radius: 12px;
    }

    video {
      width: 600px;
      max-width: 90vw;
      border-radius: 10px;
    }

    canvas {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    /* CARDS */
    .card {
      width: 220px;
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 13px;
      color: #94a3b8;
    }

    .value {
      font-size: 20px;
      margin-top: 6px;
      color: #22c55e;
    }

    .status {
      color: #fbbf24;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">🧠 AI DASHBOARD</div>
    <div class="menu">
      <div>📷 Live</div>
      <div>📊 Analytics</div>
      <div>⚙ Settings</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">Real-time AI Vision System</div>

    <div class="dashboard">

      <!-- CAMERA -->
      <div class="camera-box">
        <video id="video" autoplay muted></video>
      </div>

      <!-- PANEL -->
      <div>

        <div class="card">
          <div class="title">System Status</div>
          <div id="status" class="value status">Starting...</div>
        </div>

        <div class="card">
          <div class="title">Gender</div>
          <div id="gender" class="value">-</div>
        </div>

        <div class="card">
          <div class="title">Age Range</div>
          <div id="age" class="value">-</div>
        </div>

        <div class="card">
          <button onclick="toggleDetection()" id="btn">
            ⏯ Pause Detection
          </button>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
