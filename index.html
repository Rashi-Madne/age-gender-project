<!DOCTYPE html>
<html>
<head>
  <title>AI Vision Dashboard</title>

  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      display: flex;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 220px;
      background: #0f172a;
      height: 100vh;
      padding: 20px;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .menu div {
      margin: 12px 0;
      color: #94a3b8;
      cursor: pointer;
    }

    .menu div:hover {
      color: white;
    }

    /* ================= MAIN ================= */
    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      font-size: 22px;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    /* ================= CARDS ================= */
    .card {
      width: 240px;
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
    }

    .title {
      font-size: 13px;
      color: #94a3b8;
    }

    .value {
      font-size: 20px;
      margin-top: 6px;
      color: #22c55e;
    }

    .status {
      color: #fbbf24;
    }

    /* ================= CAMERA ================= */
    .camera-box {
      position: relative;
      background: #111827;
      padding: 10px;
      border-radius: 12px;
      width: fit-content;
    }

    video {
      width: 600px;
      max-width: 90vw;
      border-radius: 10px;
    }

    canvas {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    /* ================= VIEWS ================= */
    .view {
      display: none;
    }

    .active {
      display: block;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">🧠 AI DASHBOARD</div>

    <div class="menu">
      <div onclick="showView('live')">📷 Live</div>
      <div onclick="showView('analytics')">📊 Analytics</div>
      <div onclick="showView('settings')">⚙ Settings</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">Real-time AI Vision System</div>

    <!-- LIVE VIEW -->
    <div id="liveView" class="view active">

      <div class="camera-box">
        <video id="video" autoplay muted></video>
      </div>

      <div class="card">
        <div class="title">System Status</div>
        <div id="status" class="value status">Starting...</div>
      </div>

      <div class="card">
        <div class="title">Gender</div>
        <div id="gender" class="value">-</div>
      </div>

      <div class="card">
        <div class="title">Age Range</div>
        <div id="age" class="value">-</div>
      </div>

      <div class="card">
        <button onclick="toggleDetection()" id="btn">
          ⏯ Pause Detection
        </button>
      </div>

    </div>

    <!-- ANALYTICS -->
    <div id="analyticsView" class="view">
      <div class="card">
        <div class="title">📊 Analytics Panel</div>
        <div class="value">Face Detection: Active</div>
        <div class="value">Age Model: Running</div>
        <div class="value">Gender Model: Running</div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settingsView" class="view">
      <div class="card">
        <div class="title">⚙ Settings</div>
        <div class="value">Camera: Enabled</div>
        <div class="value">AI Mode: Real-time</div>
        <div class="value">Model: face-api.js</div>
      </div>
    </div>

  </div>

</body>
</html>
